version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules # prevent local node_modules from being overwritten
    environment:
      - CHOKIDAR_USEPOLLING=true # ensure hmr works across some file systems
    restart: unless-stopped
    depends_on:
      - api
